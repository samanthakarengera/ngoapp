<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <title>NGO Anderlecht - Contact</title>
</head>
<body>
<nav class="navbar">
    <a href="/">NGO</a>
    <a href="/new">New</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
</nav>
<div class="container">
<h1>Contact</h1>
    <form action="/contact/send" method="post">

        <input type="email" name="email" placeholder="Jouw email" required>

        <input type="text" name="subject" placeholder="Onderwerp" required>

        <textarea name="message" placeholder="Bericht" required></textarea>

        <button type="submit">Verstuur</button>

    </form>
</div>
<footer class="text-center mt-5">
    <hr>
    <p>
        © 2026 NGO Anderlecht
    </p>
</footer>
</body>
</html>
