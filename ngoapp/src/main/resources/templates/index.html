<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <title>NGO Anderlecht - Homepage</title>
</head>
<body>
<nav class="navbar">

    <a href="/" class="navbar-brand">
        NGO Anderlecht
    </a>

    <a href="/new" class="text-white">
        Nieuw evenement
    </a>

    <a href="/about" class="text-white">
        About
    </a>

    <a href="/contact" class="text-white">
        Contact
    </a>

</nav>
<h1>NGO Anderlecht</h1>
<main class="container">
    <h2>Laatste 10 Evenementen</h2>

    <table class="table">
        <thead>
        <tr>
            <th>Titel</th>
            <th>Organisatie</th>
            <th>Details</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="evenement : ${evenementen}">

            <td th:text="${evenement.titel}"></td>

            <td th:text="${evenement.organisatie}"></td>

            <td>
                <a th:href="@{/details/{id}(id=${evenement.id})}"
                   class="btn btn-primary">
                    Details
                </a>
            </td>

        </tr>
        </tbody>
    </table>

    <div class="action-bar">
        <a href="/new" class="btn-primary">Nieuw evenement toevoegen</a>
    </div>
</main>
<footer class="text-center mt-5">
    <hr>
    <p>
        © 2026 NGO Anderlecht
    </p>
</footer>
</body>
</html>
